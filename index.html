<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Jazz Commander RC1</title>
<style>
:root {
  --bg:#070b10;--panel:#0d131b;--panel2:#121b25;--text:#eef6ff;--muted:#9fb0c4;
  --line:rgba(255,255,255,.11);--accent:#f3b545;--green:#1ed760;--purple:#b78cff;--red:#ff6b6b;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
body{padding:12px 12px 96px;max-width:980px;margin:auto}
h1,h2,h3{margin:0 0 8px}
p{margin:6px 0;color:var(--muted);line-height:1.45}
button,a.btn,label.btn{min-height:48px;border-radius:14px;border:1px solid var(--line);background:var(--panel2);color:var(--text);font-weight:900;padding:10px 12px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;text-align:center}
button.primary,.btn.primary{background:var(--green);border-color:var(--green);color:#041006}
button.warn{background:#151207;border-color:rgba(243,181,69,.5);color:#f7e6bd}
button.danger{background:#1b0f0f;border-color:rgba(255,107,107,.55);color:#ffb4b4}
input,select,textarea{width:100%;background:#0b0f14;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px;font:inherit}
textarea{min-height:120px}
.top{position:sticky;top:0;z-index:10;background:rgba(7,11,16,.96);backdrop-filter:blur(12px);padding:10px 0;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand h1{font-size:1.2rem}
.version{color:var(--muted);font-size:.78rem;font-weight:800}
.modebar,.tabs,.daytabs,.playlist-tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
.tabs{grid-template-columns:repeat(4,1fr)}
.tab.active,.mode.active,.daytab.active,.playlist-tab.active{background:var(--green);border-color:var(--green);color:#041006}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 12px 32px rgba(0,0,0,.18)}
.kicker{font-size:.74rem;color:var(--accent);font-weight:1000;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.grid{display:grid;gap:10px}
.two{grid-template-columns:1fr}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.badge{font-size:.72rem;font-weight:1000;border:1px solid var(--line);border-radius:999px;padding:4px 8px;color:var(--muted)}
.badge.HOLY{border-color:rgba(243,181,69,.6);background:#151207;color:#f7e6bd}
.badge.HIGH{border-color:rgba(30,215,96,.45);background:#0d1a12;color:#9df2b0}
.badge.CANDIDATE{border-color:rgba(183,140,255,.45);background:#12101c;color:#d9c4ff}
.badge.SKIP{border-color:rgba(255,107,107,.5);background:#1b0f0f;color:#ffb4b4}
.small{font-size:.86rem;color:var(--muted)}
.concert{background:#0b1017;border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px 0}
.concert-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.time{font-weight:1000;color:#fff;white-space:nowrap}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.view{display:none}.view.active{display:block}
.statusline{white-space:pre-wrap;background:#080d13;border:1px solid var(--line);border-radius:12px;padding:10px;color:var(--muted);font-size:.86rem}
.music-stat{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.music-stat div{background:#09140d;border:1px solid rgba(30,215,96,.25);border-radius:14px;padding:10px;text-align:center}
.music-stat b{display:block;color:#8ff0ad;font-size:1.1rem}
.track-row{display:grid;grid-template-columns:auto 48px 1fr auto;gap:10px;align-items:center;border:1px solid var(--line);background:#0d131b;border-radius:12px;padding:10px;margin:7px 0}
.cover{width:48px;height:48px;border-radius:10px;object-fit:cover;background:#091018;border:1px solid var(--line)}
.round{margin:14px 0 6px;color:var(--accent);font-weight:1000;text-transform:uppercase;font-size:.82rem;letter-spacing:.08em}
.export-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hidden{display:none!important}
@media(min-width:760px){.two{grid-template-columns:1fr 1fr}.tabs{grid-template-columns:repeat(8,1fr)}.modebar,.daytabs,.playlist-tabs{grid-template-columns:repeat(3,1fr)}}
@media(max-width:430px){body{padding-left:10px;padding-right:10px}.tabs{grid-template-columns:repeat(4,1fr)}.track-row{grid-template-columns:auto 44px 1fr}.track-row a{grid-column:3;justify-self:start}.export-actions{grid-template-columns:1fr}}

/* Jazz Commander 1.0.2 – Chronological Command Plan Fix */
:root{--holy:#f3b545;--high:#45d56b;--interesting:#56a8ff;--discover:#b78cff;--calm:#6ec8ff}
body[data-mode="planning"]{--modeAccent:#56a8ff}body[data-mode="festival"]{--modeAccent:#f3b545}
.commander-shell{display:grid;gap:12px}.commander-hero{border:1px solid rgba(243,181,69,.35);background:radial-gradient(circle at 88% 10%,rgba(243,181,69,.12),transparent 36%),linear-gradient(180deg,#121923,#0b1017);border-radius:22px;padding:18px;min-height:210px;box-shadow:0 16px 42px rgba(0,0,0,.28)}
.commander-hero .eyebrow{font-size:.74rem;font-weight:1000;letter-spacing:.1em;text-transform:uppercase;color:var(--modeAccent)}.commander-order{font-size:clamp(1.7rem,7vw,3.4rem);line-height:1.02;font-weight:1000;margin:10px 0 8px}.commander-artist{font-size:clamp(1.12rem,4vw,1.45rem);font-weight:950}.commander-sub{color:var(--muted);line-height:1.4;margin-top:8px}.commander-countdown{font-size:1.05rem;font-weight:900;color:var(--accent);margin-top:12px}
.commander-grid{display:grid;grid-template-columns:1fr;gap:10px}.command-card{border:1px solid var(--line);background:linear-gradient(180deg,#111821,#0b1017);border-radius:18px;padding:14px;position:relative;overflow:hidden}.command-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--cardAccent,var(--line))}.command-card.now{--cardAccent:var(--holy)}.command-card.next{--cardAccent:var(--high)}.command-card.later{--cardAccent:var(--interesting)}.command-card.opportunity{--cardAccent:var(--discover);background:#100f17}.command-card.calm{--cardAccent:var(--calm);background:#0c141b}
.command-card .label{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;font-weight:1000;color:var(--cardAccent)}.command-card .title{font-size:1.12rem;font-weight:1000;margin-top:5px}.command-card .meta{color:var(--muted);font-size:.88rem;margin-top:5px}.command-card .instruction{font-weight:850;margin-top:9px;line-height:1.4}.command-card .reason{color:var(--muted);font-size:.86rem;margin-top:7px}
.mode-explainer{border:1px solid var(--line);border-radius:16px;padding:12px;background:#0b1017;margin-top:10px}body[data-mode="festival"] .planning-only{display:none!important}body[data-mode="planning"] .festival-only{display:none!important}body[data-mode="festival"] .commander-hero{min-height:270px;padding:20px}body[data-mode="festival"] .commander-order{font-size:clamp(2rem,10vw,4rem)}body[data-mode="festival"] .command-card{padding:16px;min-height:112px}body[data-mode="festival"] .command-card .title{font-size:1.25rem}body[data-mode="festival"] .command-card .instruction{font-size:1.05rem}body[data-mode="festival"] .concert p,body[data-mode="festival"] .concert .badges .badge:not(.HOLY):not(.HIGH){display:none}body[data-mode="festival"] .actions button{min-height:54px}
.plan-overview{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.plan-metric{border:1px solid var(--line);background:#0b1017;border-radius:14px;padding:10px;text-align:center}.plan-metric b{display:block;font-size:1.15rem;color:var(--modeAccent)}.plan-metric span{font-size:.74rem;color:var(--muted);font-weight:900;text-transform:uppercase}.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:var(--modeAccent)}.commander-empty{border:1px dashed var(--line);border-radius:18px;padding:18px;color:var(--muted);text-align:center}
@media(min-width:760px){.commander-grid{grid-template-columns:repeat(3,1fr)}.commander-grid .opportunity,.commander-grid .calm{grid-column:1/-1}.plan-overview{grid-template-columns:repeat(4,1fr)}}


/* Jazz Commander 1.0.2 – Chronological Command Plan Fix */
.command-card.split{--cardAccent:#ff9f43;background:#18110b}
.command-card.split .title{font-size:1.18rem}
.split-steps{display:grid;gap:7px;margin-top:10px}
.split-step{border:1px solid rgba(255,159,67,.28);background:#120d09;border-radius:11px;padding:8px}
.split-step b{color:#ffc178}


/* Jazz Commander 1.0.2 – Chronological Command Plan Fix */
.command-timeline{display:grid;gap:10px}
.timeline-entry{position:relative;padding-left:20px}
.timeline-entry::before{content:"";position:absolute;left:5px;top:0;bottom:-10px;width:2px;background:var(--line)}
.timeline-entry:last-child::before{bottom:50%}
.timeline-entry::after{content:"";position:absolute;left:0;top:18px;width:12px;height:12px;border-radius:50%;background:var(--timelineAccent,var(--modeAccent));box-shadow:0 0 0 4px #0b1017}
.timeline-entry.opportunity{--timelineAccent:var(--discover)}
.timeline-entry.split{--timelineAccent:#ff9f43}
.timeline-entry.major{--timelineAccent:var(--holy)}
.cluster-card{border:1px solid rgba(86,168,255,.30);background:#0d141d;border-radius:18px;padding:14px}
.cluster-card .cluster-title{font-weight:1000;font-size:1.05rem}
.cluster-list{display:grid;gap:7px;margin-top:9px}
.cluster-row{border:1px solid var(--line);border-radius:11px;padding:8px;background:#0a1017}
.cluster-row b{display:block}
.cluster-row .small{margin-top:3px}

</style>
</head>

      <h1>🎷 Jazz Commander</h1>
      <div id="releaseLine" class="version"></div>
    </div>
  </div>
  <div class="modebar">
    <button id="modePlanning" class="mode active" onclick="setMode('planning')">🧠 Planning</button>

<section id="view-command" class="view active"></section>
<section id="view-schedule" class="view"></section>
<section id="view-discover" class="view"></section>
<section id="view-decisions" class="view"></section>

</main>

<script>
(function(){
'use strict';
const APP = JSON.parse(document.getElementById('jazz-data').textContent);
const DAYS = APP.festival.days;
const CONCERTS = APP.festival.concerts;
const CLIENT_ID='aee9a8a5438d46ff93d1b89cd0d37bd9';
const REDIRECT='https://mrmart78.github.io/JazzCommander/';
const SCOPES='playlist-read-private playlist-modify-private playlist-modify-public user-read-private';
const PREF_KEY='jc_rc1_prefs';
const MEM_KEY='jc_rc1_memory';
const DEC_KEY='jc_rc1_decisions';
let state={view:'command',mode:localStorage.getItem('jc_rc1_mode')||'planning',day:localStorage.getItem('jc_rc1_day')||DAYS[0].date,playlist:localStorage.getItem('jc_rc1_playlist')||'friday'};
let playlistCache={};

function byId(id){return document.getElementById(id)}
function min(t){let [h,m]=String(t||'0:0').split(':').map(Number); if(h<6)h+=24; return h*60+(m||0)}
function fmtDay(d){let found=DAYS.find(x=>x.date===d||x.name===d);return (found&&found.name)||d||'Festivaldag'}
function statusRank(s){return {HOLY:4,HIGH:3,INTERESTING:2,CANDIDATE:1,SKIP:0}[s]||1}
function basePrefs(){let o={}; CONCERTS.forEach(raw=>{let c=normalizeConcert(raw);o[c.id]={status:c.status,score:c.score,match:c.match,split:c.split||0}}); return o}
function loadMerged(key,pattern){let out={}; try{Object.assign(out,JSON.parse(localStorage.getItem(key)||'{}'))}catch(e){}
  for(let i=0;i<localStorage.length;i++){let k=localStorage.key(i)||''; if(k===key)continue; if(pattern.test(k)){try{Object.assign(out,JSON.parse(localStorage.getItem(k)||'{}'))}catch(e){}}}
  return out;
}
let PREFS=Object.assign(basePrefs(),loadMerged(PREF_KEY,/jazzCommanderPrefs|jc_rc1_prefs/i));
let MEMORY=loadMerged(MEM_KEY,/jazzCommanderMemory|jc_rc1_memory/i);
let DECISIONS=loadMerged(DEC_KEY,/jazzCommanderDecisions|jc_rc1_decisions/i);
saveAll();

function normalizeConcert(c){
  let d=c.day||c.date||DAYS[0]?.date||'';
  let dayObj=DAYS.find(x=>x.date===d)||DAYS[0]||{};
  let artist=c.artist||c.name||c.title||'Okänd artist';
  return Object.assign({},c,{id:c.id||((d+'-'+(c.start||'')+'-'+artist).toLowerCase().replace(/[^a-z0-9åäö]+/g,'-')),day:d,dayName:c.dayName||dayObj.name||'Festivaldag',artist:artist,short:c.short||artist,stage:c.stage||c.venue||c.location||'Okänd scen',start:c.start||c.time||'00:00',end:c.end||'00:00',status:c.status||'CANDIDATE',score:c.score==null?58:c.score,match:c.match==null?65:c.match,tags:Array.isArray(c.tags)?c.tags:[],reason:c.reason||'Festivalartist.',strategy:c.strategy||'Justera i Prefs om du vill prioritera.',split:c.split||0});
}
function pref(c){let n=normalizeConcert(c);return Object.assign({},n,PREFS[n.id]||{})}
function concerts(){return CONCERTS.map(pref).filter(c=>c.status!=='SKIP')}
function saveAll(){localStorage.setItem(PREF_KEY,JSON.stringify(PREFS));localStorage.setItem(MEM_KEY,JSON.stringify(MEMORY));localStorage.setItem(DEC_KEY,JSON.stringify(DECISIONS));}
function setMode(m){state.mode=m;localStorage.setItem('jc_rc1_mode',m);document.body.dataset.mode=m;render()}
function showView(v){state.view=v;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));byId('view-'+v).classList.add('active');render()}
window.showView=showView; window.setMode=setMode;

function dayTabs(){return '<div class="daytabs">'+DAYS.map(d=>`<button class="daytab ${state.day===d.date?'active':''}" onclick="setDay('${d.date}')">${d.name}</button>`).join('')+'</div>'}
window.setDay=function(d){state.day=d;localStorage.setItem('jc_rc1_day',d);render()};

function concertCard(c,actions=true){
  return `<div class="concert"><div class="concert-head"><div><b>${c.short||c.artist}</b><div class="small">${c.artist}</div></div><div class="time">${c.start}–${c.end}</div></div>
  <div class="small">${c.dayName} • ${c.stage}</div><div class="badges"><span class="badge ${c.status}">${c.status}</span><span class="badge">${c.match||0}% match</span>${(c.tags||[]).slice(0,3).map(t=>`<span class="badge">${t}</span>`).join('')}</div>
  <p>${c.reason||''}</p>${actions?`<div class="actions"><button onclick="setStatus('${c.id}','HOLY')">Holy</button><button onclick="setStatus('${c.id}','HIGH')">High</button><button onclick="setStatus('${c.id}','CANDIDATE')">Candidate</button><button class="danger" onclick="skipConcert('${c.id}')">Skippa</button></div>`:''}</div>`;
}
window.setStatus=function(id,status){PREFS[id]=PREFS[id]||{};PREFS[id].status=status;if(status==='HOLY')PREFS[id].score=100;if(status==='HIGH')PREFS[id].score=86;if(status==='CANDIDATE')PREFS[id].score=58;saveAll();render()};
window.skipConcert=function(id){PREFS[id]=PREFS[id]||{};PREFS[id].status='SKIP';MEMORY[id]={state:'skipped',time:new Date().toISOString()};saveAll();render()};
window.unskip=function(id){
  let raw=CONCERTS.map(normalizeConcert).find(c=>c.id===id);
  PREFS[id]=PREFS[id]||{};
  let original=(raw&&raw.status&&raw.status!=='SKIP')?raw.status:'CANDIDATE';
  PREFS[id].status=original;
  if(PREFS[id].score==null)PREFS[id].score=(original==='HOLY'?100:original==='HIGH'?86:58);
  delete MEMORY[id];
  saveAll();
  render();
};


function safeConcert(c){return Object.assign({id:'',day:'',dayName:'Festivaldag',artist:'Okänd artist',short:'Okänd artist',stage:'Okänd scen',start:'00:00',end:'00:00',status:'CANDIDATE',match:0,score:0,tags:[],reason:'',strategy:'',split:0},c||{})}
function dayConcerts(day){return concerts().map(safeConcert).filter(c=>c.day===day).sort((a,b)=>min(a.start)-min(b.start))}
function importantConcerts(day){return dayConcerts(day).filter(c=>statusRank(c.status)>=2)}
function conflictGroups(day){let list=importantConcerts(day),groups=[];for(let i=0;i<list.length;i++){let g=[list[i]];for(let j=i+1;j<list.length;j++)if(overlaps(list[i],list[j]))g.push(list[j]);if(g.length>1){let key=g.map(x=>x.id).sort().join('|');if(!groups.some(x=>x.key===key))groups.push({key:key,items:g})}}return groups}
function bestOf(items){return items.slice().sort((a,b)=>statusRank(b.status)-statusRank(a.status)||(b.score||0)-(a.score||0)||(b.match||0)-(a.match||0))[0]}
function fmtMin(n){if(n<=0)return 'nu';if(n<60)return n+' min';let h=Math.floor(n/60),m=n%60;return m?h+' h '+m+' min':h+' h'}
function currentFestivalMinutes(){let d=new Date(),iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(iso===state.day)return d.getHours()*60+d.getMinutes();let list=importantConcerts(state.day);return list.length?Math.max(0,min(list[0].start)-20):0}
function commandTimeline(day){
  let list=importantConcerts(day);
  if(!list.length)return {now:null,next:null,later:null,gap:null,overlap:null,split:null,all:list,nowM:currentFestivalMinutes()};
  let nowM=currentFestivalMinutes();

  let active=list.filter(c=>min(c.start)<=nowM && nowM<min(c.end))
    .sort((a,b)=>statusRank(b.status)-statusRank(a.status)||(b.score||0)-(a.score||0)||(b.match||0)-(a.match||0));
  let current=active[0]||null;
  let future=list.filter(c=>min(c.start)>nowM).sort((a,b)=>min(a.start)-min(b.start));

  let overlap=null;
  if(current){
    let candidates=list.filter(c=>c.id!==current.id && min(c.start)<min(current.end) && min(c.end)>nowM);
    if(candidates.length){
      overlap=candidates.sort((a,b)=>
        statusRank(b.status)-statusRank(a.status) ||
        (b.score||0)-(a.score||0) ||
        min(a.start)-min(b.start)
      )[0];
    }
  }

  let split=null;
  if(current && overlap){
    let leaveAt;
    if(min(overlap.start)>nowM) leaveAt=Math.max(nowM,min(overlap.start)-5);
    else leaveAt=Math.min(min(current.end)-5,nowM+5);
    let hh=String(Math.floor((leaveAt%1440)/60)).padStart(2,'0');
    let mm=String(leaveAt%60).padStart(2,'0');
    split={from:current,to:overlap,leaveAt:hh+':'+mm,arriveAt:min(overlap.start)>nowM?overlap.start:'så snart som möjligt'};
  }

  let next=future[0]||null;
  let later=future[1]||null;
  let gap=null;
  if(!current && next){
    let mins=Math.max(0,min(next.start)-nowM);
    if(mins>=25)gap={minutes:mins,from:null,to:next,start:nowM,end:min(next.start)};
  }else if(current && !overlap && next){
    let mins=min(next.start)-min(current.end);
    if(mins>=25)gap={minutes:mins,from:current,to:next,start:min(current.end),end:min(next.start)};
  }

  return {now:current,next:next,later:later,gap:gap,overlap:overlap,split:split,active:active,all:list,nowM:nowM};
}
function orderFor(tl){
  if(tl.split){
    return {eyebrow:'PÅGÅENDE BESLUT',order:'SPLITTA KVÄLLEN',artist:(tl.split.from.short||tl.split.from.artist)+' → '+(tl.split.to.short||tl.split.to.artist),sub:tl.split.from.stage+' → '+tl.split.to.stage,countdown:'Lämna omkring '+tl.split.leaveAt,instruction:'Se nuvarande konsert en stund till, gå sedan direkt mot nästa prioriterade spelning.'};
  }
  if(tl.now){
    let remain=min(tl.now.end)-tl.nowM;
    return {eyebrow:'NU',order:'STANNA KVAR',artist:tl.now.short||tl.now.artist,sub:(tl.now.stage||'')+' • '+tl.now.start+'–'+tl.now.end,countdown:remain>0?'Cirka '+fmtMin(remain)+' kvar':'Pågår nu',instruction:'Du är på rätt plats. Commander bevakar nästa beslut.'};
  }
  if(tl.next){
    let wait=min(tl.next.start)-tl.nowM;
    if(wait<=20)return {eyebrow:'NÄSTA OPERATION',order:'GÅ MOT '+String(tl.next.stage||'scenen').toUpperCase(),artist:tl.next.short||tl.next.artist,sub:tl.next.start+'–'+tl.next.end,countdown:wait>0?'Start om '+fmtMin(wait):'Startar nu',instruction:'Börja röra dig nu och var på plats före start.'};
    return {eyebrow:'LÄGET',order:'LÄGET ÄR LUGNT',artist:'Nästa viktiga punkt: '+(tl.next.short||tl.next.artist),sub:(tl.next.stage||'')+' • '+tl.next.start,countdown:'Du har '+fmtMin(wait)+' marginal',instruction:'Du har utrymme att äta, vila eller upptäcka något nytt.'};
  }
  return {eyebrow:'DAGEN',order:'UPPDRAGET ÄR KLART',artist:'Inga fler prioriterade konserter',sub:'',countdown:'',instruction:'Gå fritt, upptäck något nytt eller avsluta festivaldagen.'};
}
function commandCard(label,c,klass,instruction,reason){if(!c)return '';c=safeConcert(c);return '<div class="command-card '+klass+'"><div class="label">'+label+'</div><div class="title">'+(c.short||c.artist)+'</div><div class="meta">'+c.start+'–'+c.end+' • '+c.stage+'</div><div class="instruction">'+instruction+'</div>'+(reason?'<div class="reason">'+reason+'</div>':'')+'</div>'}


function chronologicalItems(day){
  let tl=commandTimeline(day);
  let items=[];
  let nowM=tl.nowM;

  // Current gap must appear first, before the next concert.
  if(!tl.now && tl.next && tl.gap){
    items.push({type:'opportunity',time:nowM,sort:nowM,data:tl.gap});
  }

  // Active/current concert.
  if(tl.now){
    items.push({type:'concert',time:min(tl.now.start),sort:min(tl.now.start),data:tl.now,role:'NU'});
  }

  // Split instruction should appear immediately before destination.
  if(tl.split){
    items.push({type:'split',time:min(tl.split.from.end),sort:min(tl.split.to.start)-1,data:tl.split});
  }

  // Add every important concert from now onward, not only next/later.
  tl.all.filter(c=>min(c.end)>nowM && (!tl.now || c.id!==tl.now.id))
    .forEach(c=>items.push({type:'concert',time:min(c.start),sort:min(c.start),data:c,role:'PLAN'}));

  // Build evening clusters where several important concerts start within 90 minutes.
  let future=tl.all.filter(c=>min(c.end)>nowM).sort((a,b)=>min(a.start)-min(b.start));
  let used={};
  for(let i=0;i<future.length;i++){
    if(used[future[i].id])continue;
    let cluster=future.filter(c=>Math.abs(min(c.start)-min(future[i].start))<=90);
    if(cluster.length>=3){
      cluster.forEach(c=>used[c.id]=true);
      items.push({type:'cluster',time:min(future[i].start),sort:min(future[i].start)+0.5,data:cluster});
    }
  }

  return items.sort((a,b)=>a.sort-b.sort||String(a.type).localeCompare(String(b.type)));
}
function timelineConcertCard(c,index){
  c=safeConcert(c);
  let role=index===0?'NÄSTA':'PLAN';
  return '<div class="timeline-entry major"><div class="command-card '+(index===0?'next':'later')+'"><div class="label">'+role+'</div><div class="title">'+(c.short||c.artist)+'</div><div class="meta">'+c.start+'–'+c.end+' • '+c.stage+'</div><div class="instruction">'+(index===0?'Detta är nästa fasta punkt i din plan.':'Behåll denna som kommande prioriterad punkt.')+'</div><div class="reason">'+(c.reason||'Prioriterad konsert i din plan.')+'</div></div></div>';
}
function opportunityTimelineCard(gap){
  return '<div class="timeline-entry opportunity"><div class="command-card opportunity"><div class="label">OPPORTUNITY NU</div><div class="title">Du har '+fmtMin(gap.minutes)+' fri marginal</div><div class="instruction">Den här luckan ligger före nästa prioriterade konsert.</div><div class="reason">Nästa fasta punkt börjar '+gap.to.start+' på '+gap.to.stage+'.</div></div></div>';
}
function splitTimelineCard(split){
  return '<div class="timeline-entry split">'+splitCard(split)+'</div>';
}
function clusterTimelineCard(cluster){
  let start=cluster.map(c=>c.start).sort()[0];
  return '<div class="timeline-entry"><div class="cluster-card"><div class="label">KVÄLLSKLUSTER • '+start+'</div><div class="cluster-title">Flera prioriterade alternativ kring samma tid</div><div class="cluster-list">'+cluster.map(c=>'<div class="cluster-row"><b>'+c.start+' '+(c.short||c.artist)+'</b><div class="small">'+c.end+' • '+c.stage+' • '+c.status+'</div></div>').join('')+'</div></div></div>';
}
function renderChronologicalPlan(day){
  let items=chronologicalItems(day),seen={};
  let concertIndex=0;
  return '<div class="command-timeline">'+items.map(item=>{
    if(item.type==='concert'){
      if(seen[item.data.id])return '';
      seen[item.data.id]=true;
      return timelineConcertCard(item.data,concertIndex++);
    }
    if(item.type==='opportunity')return opportunityTimelineCard(item.data);
    if(item.type==='split')return splitTimelineCard(item.data);
    if(item.type==='cluster')return clusterTimelineCard(item.data);
    return '';
  }).join('')+'</div>';
}

function splitCard(split){
  if(!split)return '';
  let from=split.from,to=split.to;
  return '<div class="command-card split"><div class="label">SPLIT ADVISOR</div><div class="title">'+
    (from.short||from.artist)+' → '+(to.short||to.artist)+'</div>'+
    '<div class="split-steps">'+
      '<div class="split-step"><b>1.</b> Stanna på '+(from.short||from.artist)+' till cirka '+split.leaveAt+'.</div>'+
      '<div class="split-step"><b>2.</b> Gå direkt från '+from.stage+' mot '+to.stage+'.</div>'+
      '<div class="split-step"><b>3.</b> '+(min(to.start)<=currentFestivalMinutes()?'Konserten pågår redan – anslut så snart som möjligt.':'Sikta på att vara framme till '+split.arriveAt+'.')+'</div>'+
    '</div><div class="reason">'+(to.short||to.artist)+' pågår till '+to.end+'. Du har fortfarande en meningsfull del kvar att se.</div></div>';
}

function conflictSummary(day){return conflictGroups(day).slice(0,3).map(g=>{let w=bestOf(g.items);return '<div class="command-card later planning-only"><div class="label">KROCK</div><div class="title">'+g.items.map(x=>x.short||x.artist).join(' ↔ ')+'</div><div class="instruction">Commander lutar åt '+(w.short||w.artist)+' eftersom '+w.status+' väger tyngst.</div><div class="reason">'+g.items.map(x=>x.start+' '+x.stage).join(' • ')+'</div></div>'}).join('')}

function renderCommand(){
  let day=state.day,tl=commandTimeline(day),order=orderFor(tl),important=importantConcerts(day);
  let holy=important.filter(c=>c.status==='HOLY').length,high=important.filter(c=>c.status==='HIGH').length,conflicts=conflictGroups(day).length;

  byId('view-command').innerHTML=
    '<div class="commander-shell">'+
      '<div class="commander-hero">'+
        '<div class="eyebrow">'+order.eyebrow+' • '+fmtDay(day)+'</div>'+
        '<div class="commander-order">'+order.order+'</div>'+
        '<div class="commander-artist">'+order.artist+'</div>'+
        '<div class="commander-sub">'+order.sub+'</div>'+
        '<div class="commander-countdown">'+order.countdown+'</div>'+
        '<div class="commander-sub">'+order.instruction+'</div>'+
      '</div>'+
      dayTabs()+
      '<div class="mode-explainer planning-only"><span class="status-dot"></span><b>Planning Mode</b><p>Hela dagen visas i faktisk tidsordning, inklusive luckor, kvällskluster och splitbeslut.</p></div>'+
      '<div class="mode-explainer festival-only"><span class="status-dot"></span><b>Festival Mode</b><p>Planen är kronologisk: nuvarande lucka först, därefter nästa konsert och sedan kvällens prioriterade punkter.</p></div>'+
      '<div class="plan-overview planning-only">'+
        '<div class="plan-metric"><b>'+important.length+'</b><span>prioriterade</span></div>'+
        '<div class="plan-metric"><b>'+holy+'</b><span>Holy</span></div>'+
        '<div class="plan-metric"><b>'+high+'</b><span>High</span></div>'+
        '<div class="plan-metric"><b>'+conflicts+'</b><span>krockar</span></div>'+
      '</div>'+
      renderChronologicalPlan(day)+
      (!important.length?'<div class="commander-empty">Inga prioriterade konserter för dagen ännu. Gå till Prefs och markera Holy, High eller Interesting.</div>':'')+
    '</div>';
}
function summaryText(){let all=CONCERTS.length, active=concerts().length, holy=concerts().filter(c=>c.status==='HOLY').length, high=concerts().filter(c=>c.status==='HIGH').length;return `Konserter i datapack: ${all}\nAktiva: ${active}\nHoly: ${holy}\nHigh: ${high}\nBackup rekommenderas före varje större ändring.`}

function renderSchedule(){
  let list=concerts().filter(c=>c.day===state.day).sort((a,b)=>min(a.start)-min(b.start));
  byId('view-schedule').innerHTML=`<div class="card"><h2>Schema</h2>${dayTabs()}<p class="small">${list.length} aktiva konserter ${fmtDay(state.day)}.</p></div>`+list.map(c=>concertCard(c)).join('');
}
function renderDiscover(){
  let list=concerts().filter(c=>c.day===state.day && statusRank(c.status)<=2).sort((a,b)=>(b.match||0)-(a.match||0)).slice(0,40);
  byId('view-discover').innerHTML=`<div class="card"><h2>Discover</h2>${dayTabs()}<p>Upptäckarkandidater sorterade efter matchning.</p></div>`+list.map(c=>concertCard(c)).join('');
}
function overlaps(a,b){return a.day===b.day && min(a.start)<min(b.end) && min(b.start)<min(a.end)}
function renderDecisions(){
  let list=concerts().filter(c=>c.day===state.day).sort((a,b)=>min(a.start)-min(b.start));
  let pairs=[]; for(let i=0;i<list.length;i++)for(let j=i+1;j<list.length;j++)if(overlaps(list[i],list[j])&&(statusRank(list[i].status)>=2||statusRank(list[j].status)>=2))pairs.push([list[i],list[j]]);
  byId('view-decisions').innerHTML=`<div class="card"><h2>Beslut</h2>${dayTabs()}<p>Krockar där minst en artist är intressant.</p></div>`+(pairs.length?pairs.slice(0,40).map(([a,b])=>`<div class="card"><h3>${a.start} – krock</h3>${concertCard(a)}${concertCard(b)}</div>`).join(''):'<div class="card"><p>Inga viktiga krockar hittade för dagen.</p></div>');
}

function renderPrefs(){
 let q=(byId('prefSearch')?.value||'').toLowerCase();
 let list=CONCERTS.map(pref).filter(c=>(c.artist+' '+c.stage).toLowerCase().includes(q)).sort((a,b)=>a.artist.localeCompare(b.artist));
 byId('view-prefs').innerHTML=`<div class="card"><h2>Prefs</h2><input id="prefSearch" placeholder="Sök artist..." value="${htmlEscape(q)}" oninput="renderPrefs()"><p class="small">${list.length} artister visas. Dina ändringar sparas lokalt.</p></div>`+
 list.map(c=>`<div class="concert"><b>${c.artist}</b><div class="small">${c.dayName} ${c.start} • ${c.stage}</div><div class="actions"><select onchange="setStatus('${c.id}',this.value)"><option ${c.status==='HOLY'?'selected':''}>HOLY</option><option ${c.status==='HIGH'?'selected':''}>HIGH</option><option ${c.status==='INTERESTING'?'selected':''}>INTERESTING</option><option ${c.status==='CANDIDATE'?'selected':''}>CANDIDATE</option><option ${c.status==='SKIP'?'selected':''}>SKIP</option></select><button onclick="unskip('${c.id}')">Återaktivera</button></div></div>`).join('');
}
window.renderPrefs=renderPrefs;

function htmlEscape(s){return String(s).replace(/[&<>"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]))}

/* Spotify / Music */
function playlistKinds(){return [['my','Mina konserter'],['holy','Holy / High'],['discover','Discover'],['friday','Fredag'],['saturday','Lördag'],['sunday','Söndag']]}
function playlistTitle(k){return {my:'Commander Route',holy:'Commander Holy High',discover:'Commander Discovery',friday:'Commander Friday',saturday:'Commander Saturday',sunday:'Commander Sunday'}[k]||'Commander Playlist'}
function playlistConcerts(k){
 let list=concerts();
 if(k==='friday')list=list.filter(c=>c.day===DAYS[0].date);
 if(k==='saturday')list=list.filter(c=>c.day===DAYS[1].date);
 if(k==='sunday')list=list.filter(c=>c.day===DAYS[2].date);
 if(k==='holy')list=list.filter(c=>['HOLY','HIGH'].includes(c.status));
 if(k==='discover')list=list.filter(c=>!['HOLY','HIGH','SKIP'].includes(c.status)).sort((a,b)=>(b.match||0)-(a.match||0)).slice(0,24);
 if(k==='my')list=list.filter(c=>['HOLY','HIGH','INTERESTING'].includes(c.status));
 return list.sort((a,b)=>a.day.localeCompare(b.day)||min(a.start)-min(b.start));
}
function setPlaylist(k){state.playlist=k;localStorage.setItem('jc_rc1_playlist',k);renderMusic()}
window.setPlaylist=setPlaylist;
function token(){try{let t=JSON.parse(localStorage.getItem('jazzCommanderSpotifyToken')||'null'); if(t&&Date.now()<(t.expires_at||0))return t}catch(e){} return null}
function spotifyConnected(){return !!token()}
window.spotifyConnected=spotifyConnected;
function rand(n){let a=new Uint8Array(n);crypto.getRandomValues(a);return Array.from(a).map(x=>'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'[x%66]).join('')}
function b64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
async function sha(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s))}
window.connectSpotify=async function(force=true){let verifier=rand(96), challenge=b64(await sha(verifier)), st=rand(24);localStorage.setItem('jazzCommanderSpotifyVerifier',verifier);localStorage.setItem('jazzCommanderSpotifyState',st);let p=new URLSearchParams({response_type:'code',client_id:CLIENT_ID,scope:SCOPES,redirect_uri:REDIRECT,code_challenge_method:'S256',code_challenge:challenge,state:st,show_dialog:force?'true':'false'});location.href='https://accounts.spotify.com/authorize?'+p};
async function handleSpotifyCallback(){let p=new URLSearchParams(location.search), code=p.get('code'); if(!code)return; let verifier=localStorage.getItem('jazzCommanderSpotifyVerifier'); let body=new URLSearchParams({client_id:CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:REDIRECT,code_verifier:verifier});let r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});if(r.ok){let t=await r.json();t.expires_at=Date.now()+((t.expires_in||3600)-60)*1000;localStorage.setItem('jazzCommanderSpotifyToken',JSON.stringify(t));history.replaceState({},document.title,REDIRECT);}}
window.reconnectSpotify=function(){localStorage.removeItem('jazzCommanderSpotifyToken');connectSpotify(true)}
window.disconnectSpotify=function(){localStorage.removeItem('jazzCommanderSpotifyToken');renderMusic()}
async function api(path){let t=token(); if(!t)throw new Error('Spotify är inte anslutet'); let r=await fetch('https://api.spotify.com/v1'+path,{headers:{Authorization:'Bearer '+t.access_token}}); if(!r.ok)throw new Error('Spotify '+r.status+': '+await r.text()); return r.json()}
function artistCandidates(name){let raw=String(name||'').trim(), norm=raw.replace(/\s+feat\.?\s+|\s+featuring\s+|\s+presents\s+|\s+meets\s+|\s+vs\.?\s+/ig,' with ').replace(/\s*&\s*/g,' and ');let parts=norm.split(/\s+(?:with|and|x)\s+/i).map(x=>x.replace(/\([^)]*\)/g,'').trim()).filter(Boolean);let out=[raw];parts.forEach(x=>{if(!out.some(y=>y.toLowerCase()===x.toLowerCase()))out.push(x)});return out}
async function searchTracks(artist){let all=[];for(let cand of artistCandidates(artist)){let p=new URLSearchParams({q:cand,type:'track',limit:'10',market:'SE'});let r=await api('/search?'+p);all=all.concat(r.tracks?.items||[]);if(all.length>=12)break}let seen={}, u=[];for(let t of all){let k=(t.name+'|'+t.artists.map(a=>a.name).join(',')).toLowerCase();if(t.uri&&!seen[k]){seen[k]=1;u.push(t)}}return u.sort((a,b)=>(b.popularity||0)-(a.popularity||0)).slice(0,5)}
window.buildMusic=async function(){let k=state.playlist, list=playlistConcerts(k), log=byId('musicLog'), out=byId('musicOutput'); if(!spotifyConnected()){log.textContent='Anslut Spotify först.';return}; let per=[]; for(let i=0;i<list.length;i++){log.textContent=`Hämtar låtar ${i+1}/${list.length}: ${list[i].artist}`; try{per.push({concert:list[i],tracks:await searchTracks(list[i].artist)})}catch(e){per.push({concert:list[i],tracks:[]})}} let rows=[]; for(let r=0;r<5;r++)per.forEach(a=>{if(a.tracks.length)rows.push({round:r+1,concert:a.concert,track:a.tracks[Math.min(r,a.tracks.length-1)]})}); playlistCache[k]=rows; renderMusicRows(rows); log.textContent=`Klar: ${rows.length} låtar • ${new Set(rows.map(r=>r.concert.id)).size} artister.`}
function renderMusicRows(rows){let min=Math.round(rows.reduce((s,r)=>s+(r.track.duration_ms||0),0)/60000);let h=`<div class="music-stat"><div><b>${rows.length}</b><span>låtar</span></div><div><b>${new Set(rows.map(r=>r.concert.id)).size}</b><span>artister</span></div><div><b>${min}</b><span>minuter</span></div></div>`; rows.forEach((r,i)=>{if(i===0||rows[i-1].round!==r.round)h+=`<div class="round">Varv ${r.round}</div>`;let img=r.track.album?.images?.slice(-1)[0]?.url||'';h+=`<div class="track-row"><div>${i+1}</div>${img?`<img class="cover" src="${img}" alt="">`:'<div class="cover"></div>'}<div><b>${r.track.name}</b><div class="small">${r.concert.short} • ${r.track.artists.map(a=>a.name).join(', ')}</div></div><a class="btn" target="_blank" href="${r.track.external_urls?.spotify||'#'}">Öppna</a></div>`}); byId('musicOutput').innerHTML=h}
function csvRows(rows){let esc=v=>/[",\n]/.test(String(v??''))?'"'+String(v??'').replace(/"/g,'""')+'"':String(v??'');let lines=[['Position','Round','Festival Artist','Track','Spotify Artist','Spotify URL','Spotify URI'].map(esc).join(',')];rows.forEach((r,i)=>lines.push([i+1,r.round,r.concert.short,r.track.name,r.track.artists.map(a=>a.name).join('; '),r.track.external_urls?.spotify||'',r.track.uri||''].map(esc).join(',')));return lines.join('\n')}
function txtRows(rows){return rows.map((r,i)=>`${i+1}. ${r.concert.short} - ${r.track.name} - ${r.track.artists.map(a=>a.name).join(', ')}`).join('\n')}
function dl(name,content,type){let blob=new Blob([content],{type}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}
window.exportMusic=function(fmt){let rows=playlistCache[state.playlist]||[];if(!rows.length)return alert('Bygg listan först.');let name=playlistTitle(state.playlist).replace(/\s+/g,'_');if(fmt==='csv')dl(name+'.csv',csvRows(rows),'text/csv;charset=utf-8');else dl(name+'.txt',txtRows(rows),'text/plain;charset=utf-8')}
window.copyMusic=function(){let rows=playlistCache[state.playlist]||[];if(!rows.length)return alert('Bygg listan först.');navigator.clipboard?.writeText(csvRows(rows)).then(()=>alert('CSV kopierad')).catch(()=>alert('Kunde inte kopiera. Använd Spara CSV.'))}

function renderMusic(){
 let tabs='<div class="playlist-tabs">'+playlistKinds().map(([k,n])=>`<button class="playlist-tab ${state.playlist===k?'active':''}" onclick="setPlaylist('${k}')">${n}</button>`).join('')+'</div>';
 byId('view-music').innerHTML=`<div class="card"><div class="kicker">RC1 Music</div><h2>Spotify-reselista</h2><p>Välj lista → anslut Spotify → bygg → exportera CSV till TuneMyMusic/Soundiiz.</p>${tabs}</div>
 <div class="card"><h3>1. Spotify</h3><p>${spotifyConnected()?'Spotify är anslutet.':'Anslut Spotify för att hämta riktiga låtar via Search.'}</p><div class="actions">${spotifyConnected()?'<button onclick="reconnectSpotify()">Reconnect</button><button class="danger" onclick="disconnectSpotify()">Disconnect</button>':'<button class="primary" onclick="connectSpotify(true)">Connect Spotify</button>'}</div></div>
 <div class="card"><h3>2. Bygg ${playlistTitle(state.playlist)}</h3><p class="small">${playlistConcerts(state.playlist).length} artister i urvalet.</p><button class="primary" onclick="buildMusic()">Bygg lista</button><div id="musicLog" class="statusline" style="margin-top:10px">Redo.</div><div id="musicOutput"></div></div>
 <div class="card"><h3>3. Exportera</h3><div class="export-actions"><button class="primary" onclick="exportMusic('csv')">Spara CSV</button><button onclick="copyMusic()">Kopiera CSV</button><button onclick="exportMusic('txt')">Spara TXT</button><a class="btn" target="_blank" href="https://www.tunemymusic.com/transfer/csv-to-spotify">TuneMyMusic</a></div></div>`;
}

/* Safety */
function safetyKeys(){let keys=[];for(let i=0;i<localStorage.length;i++){let k=localStorage.key(i)||'';if(/jazzCommander|jc_rc1/i.test(k))keys.push(k)}return keys.sort()}
function snapshot(){let o={app:'Jazz Commander',type:'rc1-backup',createdAt:new Date().toISOString(),localStorage:{}};safetyKeys().forEach(k=>o.localStorage[k]=localStorage.getItem(k));return o}
window.backup=function(){dl('JazzCommander_RC1_Backup.json',JSON.stringify(snapshot(),null,2),'application/json;charset=utf-8')}
window.restoreBackup=function(input){let f=input.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let b=JSON.parse(r.result);Object.entries(b.localStorage||{}).forEach(([k,v])=>localStorage.setItem(k,v));alert('Backup återställd. Appen laddas om.');location.reload()}catch(e){alert('Import misslyckades: '+e.message)}};r.readAsText(f)}
function renderSafety(){byId('view-safety').innerHTML=`<div class="card"><h2>Festival Safety</h2><p>Backup av lokala val, prefs, memory, Spotify-token och beslut.</p><div class="actions"><button class="primary" onclick="backup()">Backup mina val</button><label class="btn warn">Återställ backup<input class="hidden" type="file" accept="application/json" onchange="restoreBackup(this)"></label></div><div class="statusline" style="margin-top:10px">${summaryText()}\nSparade nycklar: ${safetyKeys().length}</div></div>`}

function renderData(){let byDay=DAYS.map(d=>`${d.name}: ${CONCERTS.filter(c=>c.day===d.date).length} konserter`).join('\n');byId('view-data').innerHTML=`<div class="card"><h2>Data Pack</h2><div class="statusline">Totalt: ${CONCERTS.length} konserter\n${byDay}</div><p class="small">PDF-validering: Gallowstreet 22:15, De La Soul 18:00, Thundercat 19:30 och Sun Ra Arkestra 22:45 är kontrollerade.</p></div>`}

function render(){document.body.dataset.mode=state.mode;
 byId('releaseLine').textContent=`${APP.release.name} • ${APP.release.version} • Build ${APP.release.buildDate}`;
 byId('modePlanning').classList.toggle('active',state.mode==='planning');byId('modeFestival').classList.toggle('active',state.mode==='festival');
 if(state.view==='command')renderCommand();
 if(state.view==='schedule')renderSchedule();
 if(state.view==='discover')renderDiscover();
 if(state.view==='decisions')renderDecisions();
 if(state.view==='music')renderMusic();
 if(state.view==='prefs')renderPrefs();
 if(state.view==='safety')renderSafety();
 if(state.view==='data')renderData();
}

if(typeof normalizeConcert !== 'function'){
  function normalizeConcert(c){return Object.assign({dayName:'Festivaldag',artist:'Okänd artist',short:'Okänd artist',stage:'Okänd scen',start:'00:00',end:'00:00',status:'CANDIDATE',score:58,match:65,tags:[]},c||{});}
}

async function init(){try{await handleSpotifyCallback();render()}catch(e){document.body.innerHTML='<div class="card"><h1>Jazz Commander startfel</h1><pre>'+htmlEscape(e.stack||e.message||e)+'</pre></div>'}}
window.render=render;
init();
})();
</script>
</body>
